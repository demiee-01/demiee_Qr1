<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demlee - QR Generator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          animation: {
            'float': 'float 20s infinite ease-in-out',
            'float-delayed': 'float 20s infinite ease-in-out -10s',
            'border-glow': 'borderGlow 3s infinite',
            'fade-in': 'fadeIn 0.5s ease',
            'qr-appear': 'qrAppear 0.8s cubic-bezier(0.34, 1.56, 0.64, 1)',
            'spin-slow': 'spin 1s linear infinite',
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translate(0,0) scale(1)' },
              '33%': { transform: 'translate(100px,-100px) scale(1.1)' },
              '66%': { transform: 'translate(-50px,50px) scale(0.9)' },
            },
            borderGlow: {
              '0%, 100%': { opacity: '0.5' },
              '50%': { opacity: '1' },
            },
            fadeIn: {
              from: { opacity: '0', transform: 'translateY(20px)' },
              to: { opacity: '1', transform: 'translateY(0)' },
            },
            qrAppear: {
              '0%': { opacity: '0', transform: 'scale(0.5) rotate(-10deg)' },
              '100%': { opacity: '1', transform: 'scale(1) rotate(0deg)' },
            },
          },
          backdropBlur: { '20': '20px', '15': '15px' },
        },
      },
    }
  </script>
  <style>
    body::before, body::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.3;
      animation: float 20s infinite ease-in-out;
    }
    body::before {
      width: 600px; height: 600px;
      background: #60a5fa;
      top: -200px; left: -200px;
    }
    body::after {
      width: 500px; height: 500px;
      background: #a78bfa;
      bottom: -150px; right: -150px;
      animation-delay: -10s;
    }
    @keyframes float {
      0%, 100% { transform: translate(0,0) scale(1); }
      33% { transform: translate(100px,-100px) scale(1.1); }
      66% { transform: translate(-50px,50px) scale(0.9); }
    }
    .glass-card::before {
      content: '';
      position: absolute; inset: 0;
      border-radius: 1.875rem;
      padding: 2px;
      background: linear-gradient(135deg, rgba(96,165,250,0.6), rgba(167,139,250,0.6), rgba(96,165,250,0.6));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask-composite: exclude;
      animation: borderGlow 3s infinite;
    }
    @keyframes borderGlow {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
    .result-title::after {
      content: '';
      position: absolute;
      bottom: -8px; left: 50%;
      transform: translateX(-50%);
      width: 60px; height: 3px;
      background: linear-gradient(90deg, #60a5fa, #a78bfa);
      border-radius: 2px;
      box-shadow: 0 0 10px rgba(96,165,250,0.5);
    }
    .generate-btn::before {
      content: '';
      position: absolute; top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: left 0.5s;
    }
    .generate-btn:hover::before { left: 100%; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes qrAppear {
      0% { opacity: 0; transform: scale(0.5) rotate(-10deg); }
      100% { opacity: 1; transform: scale(1) rotate(0deg); }
    }
    .result-section { animation: fadeIn 0.5s ease; }
    #qrcode { animation: qrAppear 0.8s cubic-bezier(0.34,1.56,0.64,1); }
    .notification {
      position: fixed; top: 20px; right: 20px;
      padding: 16px 24px;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(20px);
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.3);
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      color: #1e3c72; font-weight: 600; font-size: 0.95rem;
      z-index: 1000;
      transform: translateX(400px); opacity: 0;
      transition: all 0.4s cubic-bezier(0.68,-0.55,0.265,1.55);
    }
    .notification.show { transform: translateX(0); opacity: 1; }
    .notification.success { border-left: 4px solid #10b981; background: linear-gradient(135deg,rgba(16,185,129,0.1),rgba(255,255,255,0.95)); }
    .notification.error   { border-left: 4px solid #ef4444; background: linear-gradient(135deg,rgba(239,68,68,0.1),rgba(255,255,255,0.95)); }
    .notification.info    { border-left: 4px solid #3b82f6; background: linear-gradient(135deg,rgba(59,130,246,0.1),rgba(255,255,255,0.95)); }
    @media (max-width: 600px) {
      .notification { right: 10px; left: 10px; top: 10px; }
    }
    .loading {
      width: 50px; height: 50px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: rgba(96,165,250,0.8);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
